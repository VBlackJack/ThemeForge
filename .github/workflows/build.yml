name: Build and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and test
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Verify Apache 2.0 headers (.cs files)
        shell: pwsh
        run: |
          $missing = @()
          Get-ChildItem -Path src, tests -Recurse -Filter *.cs `
            | Where-Object { $_.FullName -notmatch '\\(bin|obj)\\' } `
            | ForEach-Object {
                $content = Get-Content $_.FullName -Raw
                if ($content -notmatch 'Copyright \d{4} Julien Bombled' -or
                    $content -notmatch 'Apache License, Version 2\.0') {
                    $missing += $_.FullName
                }
            }
          if ($missing.Count -gt 0) {
              Write-Host "::error::Missing Apache 2.0 header in $($missing.Count) file(s):"
              $missing | ForEach-Object { Write-Host "  - $_" }
              exit 1
          }
          Write-Host "All .cs files have proper Apache 2.0 headers."

      - name: Verify XAML attribution headers
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File tools/ci-xaml-headers.ps1

      - name: Restore
        run: dotnet restore ThemeForge.slnx

      - name: Build (Release)
        run: dotnet build ThemeForge.slnx --configuration Release --no-restore

      - name: Test (Release)
        run: dotnet test ThemeForge.slnx --configuration Release --no-build --verbosity normal
