name: Publish ThemeForge packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    name: Publish ThemeForge packages
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Pack solution
        run: dotnet pack ThemeForge.slnx --configuration Release --output artifacts

      - name: Pack template package
        # The template package is outside the solution, so the solution pack does
        # not produce it. Pack it explicitly into the same artifacts directory.
        run: dotnet pack src/ThemeForge.Templates/ThemeForge.Templates.csproj --configuration Release --output artifacts

      - name: Add GitHub Packages source
        run: dotnet nuget add source https://nuget.pkg.github.com/VBlackJack/index.json --name github --username VBlackJack --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

      - name: Push packages to GitHub Packages
        shell: pwsh
        run: |
          $packages = Get-ChildItem -Path artifacts -Filter *.nupkg
          if ($packages.Count -eq 0) {
              throw "No NuGet package found in artifacts."
          }
          foreach ($package in $packages) {
              dotnet nuget push $package.FullName --source github --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
          }

      - name: NuGet login (trusted publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: VBlackJack

      - name: Push packages to nuget.org
        shell: pwsh
        run: |
          $packages = Get-ChildItem -Path artifacts -Filter *.nupkg
          if ($packages.Count -eq 0) {
              throw "No NuGet package found in artifacts."
          }
          foreach ($package in $packages) {
              dotnet nuget push $package.FullName --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --skip-duplicate
          }
