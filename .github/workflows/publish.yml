name: Publish package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ThemeForge.Theme
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Pack ThemeForge.Theme
        run: dotnet pack src/ThemeForge.Theme/ThemeForge.Theme.csproj --configuration Release --output artifacts

      - name: Add GitHub Packages source
        run: dotnet nuget add source https://nuget.pkg.github.com/VBlackJack/index.json --name github --username VBlackJack --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text

      - name: Push package
        run: dotnet nuget push "artifacts/*.nupkg" --source github --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
